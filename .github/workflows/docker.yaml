name: Docker

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  schedule:
    - cron: '00 15 * * *'

env:
  ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
  ALIYUN_NAME_SPACE: ${{ secrets.ALIYUN_NAME_SPACE }}
  ALIYUN_REGISTRY_USER: ${{ secrets.ALIYUN_REGISTRY_USER }}
  ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Login to Aliyun
      run: docker login -u $ALIYUN_REGISTRY_USER -p $ALIYUN_REGISTRY_PASSWORD $ALIYUN_REGISTRY

    - name: Pull and Push All Images (自动读取 images.txt)
      run: |
        set +e  # 失败不中断
        echo "========== 开始同步 images.txt 里的所有镜像 =========="
        
        # 自动读取 images.txt，跳过注释和空行
        while IFS= read -r line || [ -n "$line" ]; do
          # 跳过空行和注释行
          [[ -z "$line" ]] && continue
          [[ "$line" =~ ^\s*# ]] && continue
          
          echo "====================================="
          echo "正在同步：$line"
          
          # 拉取镜像（支持 --platform 架构参数）
          docker pull $line
          
          # 提取核心镜像名（去掉 --platform 等参数）
          image=$(echo "$line" | awk '{print $NF}')
          image_name=$(echo "$image" | awk -F/ '{print $NF}')
          
          # 生成阿里云镜像地址
          new_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$image_name"
          
          # 打标签 + 推送
          docker tag "$image" "$new_image"
          docker push "$new_image"
          
          # 清理本地镜像，节省空间
          docker rmi "$image" "$new_image"
          echo "✅ 同步完成：$new_image"
          echo "====================================="
        done < images.txt
        
        echo "========== 所有镜像同步完成 =========="
