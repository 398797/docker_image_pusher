name: Docker

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
  ALIYUN_NAME_SPACE: ${{ secrets.ALIYUN_NAME_SPACE }}
  ALIYUN_REGISTRY_USER: ${{ secrets.ALIYUN_REGISTRY_USER }}
  ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Login to Aliyun
      run: docker login -u $ALIYUN_REGISTRY_USER -p $ALIYUN_REGISTRY_PASSWORD $ALIYUN_REGISTRY

    - name: Test pull and push
      run: |
        docker pull hello-world
        docker tag hello-world $ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/hello-world:latest
        docker push $ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/hello-world:latest
